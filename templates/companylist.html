<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Manager</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.5/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../static/js/company.js"></script>

</head>
<body>

    <div class="container">
        <div class="row align-items-center mb-4 mt-4">
            <div class="col-auto">
                <a href="javascript:history.back()" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i>  
                </a>
            </div>
            <div class="col text-center">
                <h4>Company List</h4>
            </div>
        </div>

        <!-- Table -->
        <div class="mt-4">
            <table id="companyTable" class="display table table-striped table-bordered" style="width:100%">
                <thead>
                    <tr>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will be dynamically added here -->
                </tbody>
            </table>
        </div>
        <div class="my-4 text-center">
            <button class="btn btn-info" id="Add_btn">Add</button>
        </div>
    </div>

    <div class="modal fade" id="compDetailModal" tabindex="-1" role="dialog" aria-labelledby="compDetailModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalCompanyName">Company name </h5> [<span id="modalEngCompany"></span>]
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <h6 hidden>ID:</h6>
                    <p id="compID" hidden></p>
                    <h6>Summary:</h6>
                    <textarea id="modalSummary" style="font-size: 12px; width: 100%; height: 100px;" placeholder="Enter summary here..."></textarea>
                    <h6>Industry:</h6>
                    <textarea id="modalIndustry" style="font-size: 12px; width: 100%; height: 100px;" placeholder="Enter industry here..."></textarea>
                    <h6>Country:</h6>
                    <textarea id="modalCountry" style="font-size: 12px; width: 100%; height: 100px;" placeholder="Enter country here..."></textarea>
                    <h6>Tags:</h6>
                    <textarea id="modalTags" style="font-size: 12px; width: 100%; height: 50px;" placeholder="Enter tags here..."></textarea>
                    <h6>Files</h6>
                    <div id="relatedFiles"></div>
                    <h6>Comment:</h6>
                    <textarea id="modalComment" style="font-size: 12px; width: 100%; height: 50px;" placeholder="Enter comment here..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" id="saveButton">Save</button>
                    <button type="button" class="btn btn-danger" id="removeButton">Remove</button>
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
